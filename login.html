<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Intranet - CLEBNE</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--primary-blue);
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            background: var(--white);
            padding: 50px 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(to right, var(--accent-yellow), #00247D, #CF142B);
            border-top-left-radius: var(--radius-lg);
            border-top-right-radius: var(--radius-lg);
        }
        .login-logo {
            width: 90px;
            height: 90px;
            margin-bottom: 20px;
        }
        .login-title {
            color: var(--primary-blue);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        .login-subtitle {
            color: var(--muted-text);
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-text);
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(9, 60, 113, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 10px;
            justify-content: center;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 14px;
            color: var(--muted-text);
            font-weight: 600;
        }
        .back-link:hover {
            color: var(--primary-blue);
        }
    </style>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

    <div class="login-container">
        <img src="Logo.png" alt="CLEBNE" class="login-logo" onerror="this.src='https://via.placeholder.com/90x90?text=Logo';">
        <h2 class="login-title">Acceso Intranet</h2>
        <p class="login-subtitle">Sistema Integrado de Gestión Legislativa</p>

        <!-- Simulación de Login que lleva al admin -->
        <form onsubmit="event.preventDefault(); window.location.href='admin.html';">
            <div class="input-group">
                <label for="username">Usuario Institucional</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Ej. admin.prensa" required>
                </div>
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al Portal Público</a>
    </div>

</body>
</html>
